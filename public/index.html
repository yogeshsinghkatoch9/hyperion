<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="Hyperion — Your computer, unleashed. Terminal, code runner, file manager, and AI assistant.">
  <meta name="theme-color" content="#1C1917">
  <meta name="color-scheme" content="dark">
  <meta property="og:title" content="HYPERION">
  <meta property="og:description" content="Your computer, unleashed. Terminal, code runner, file manager, and AI assistant.">
  <meta property="og:type" content="website">
  <meta property="og:locale" content="en_US">
  <meta name="twitter:card" content="summary">
  <meta name="twitter:title" content="HYPERION">
  <meta name="twitter:description" content="Your computer, unleashed. Terminal, code runner, file manager, and AI assistant.">
  <title>HYPERION</title>
  <link rel="manifest" href="/manifest.json">
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'><rect width='32' height='32' rx='8' fill='%231C1917'/><text x='16' y='23' font-family='serif' font-size='20' font-weight='bold' fill='%23DA7756' text-anchor='middle'>H</text></svg>">
  <link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;500;600;700&family=Plus+Jakarta+Sans:wght@400;500;600;700&family=Libre+Baskerville:wght@400;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@xterm/xterm@5.5.0/css/xterm.min.css">
  <script src="https://cdn.jsdelivr.net/npm/@xterm/xterm@5.5.0/lib/xterm.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/@xterm/addon-fit@0.10.0/lib/addon-fit.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/@xterm/addon-web-links@0.11.0/lib/addon-web-links.min.js"></script>
  <link rel="stylesheet" href="/css/hyperion.css?v=2">
  <script>
    // Load saved theme before first render to prevent flash
    try {
      const tc = JSON.parse(localStorage.getItem('hyperion_theme') || '{}');
      if (tc.mode === 'light') document.documentElement.setAttribute('data-theme', 'light');
      if (tc.accent) document.documentElement.style.setProperty('--accent', tc.accent);
      if (tc.fontSize) document.documentElement.style.setProperty('--font-size', tc.fontSize + 'px');
      if (tc.borderRadius !== undefined) document.documentElement.style.setProperty('--radius', tc.borderRadius + 'px');
      if (tc.compactMode) document.documentElement.classList.add('compact-mode');
    } catch {}
  </script>
</head>
<body>
  <a href="#main" class="skip-link">Skip to content</a>
  <button class="hamburger-btn" id="hamburgerBtn" onclick="toggleMobileSidebar()" aria-label="Toggle menu">&#9776;</button>
  <div class="shell">
    <!-- Sidebar -->
    <nav class="sidebar" id="sidebar" role="navigation" aria-label="Main navigation">
      <div class="logo">
        <div class="logo-icon">H</div>
        <span class="logo-text">HYPERION</span>
      </div>
      <!-- Nav search filter -->
      <div class="nav-search-wrap">
        <input type="text" class="nav-search" id="navSearch" placeholder="Filter tools..." oninput="_filterNav(this.value)" aria-label="Filter navigation">
        <kbd class="nav-search-hint">/</kbd>
      </div>
      <!-- Favorites (pinned by user) -->
      <div class="nav-section nav-favorites" id="navFavorites" style="display:none">
        <div class="nav-section-header" style="cursor:default"><span class="nav-section-icon">&#9733;</span><span>Favorites</span></div>
        <div class="nav-section-items" id="navFavItems"></div>
      </div>
      <!-- Recently used -->
      <div class="nav-section nav-recents" id="navRecents" style="display:none">
        <div class="nav-section-header" style="cursor:default"><span class="nav-section-icon">&#8635;</span><span>Recent</span></div>
        <div class="nav-section-items" id="navRecentItems"></div>
      </div>
      <div class="nav-items" id="navItems">
        <!-- Populated by JS: buildGroupedNav() -->
      </div>
      <div class="sidebar-bottom">
        <button class="nav-btn" data-page="settings" onclick="go('settings')" aria-label="Settings" title="Settings">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.65 1.65 0 00.33 1.82l.06.06a2 2 0 010 2.83 2 2 0 01-2.83 0l-.06-.06a1.65 1.65 0 00-1.82-.33 1.65 1.65 0 00-1 1.51V21a2 2 0 01-4 0v-.09A1.65 1.65 0 009 19.4a1.65 1.65 0 00-1.82.33l-.06.06a2 2 0 01-2.83-2.83l.06-.06A1.65 1.65 0 004.68 15a1.65 1.65 0 00-1.51-1H3a2 2 0 010-4h.09A1.65 1.65 0 004.6 9a1.65 1.65 0 00-.33-1.82l-.06-.06a2 2 0 012.83-2.83l.06.06A1.65 1.65 0 009 4.68a1.65 1.65 0 001-1.51V3a2 2 0 014 0v.09a1.65 1.65 0 001 1.51 1.65 1.65 0 001.82-.33l.06-.06a2 2 0 012.83 2.83l-.06.06A1.65 1.65 0 0019.4 9a1.65 1.65 0 001.51 1H21a2 2 0 010 4h-.09a1.65 1.65 0 00-1.51 1z"/></svg>
          <span>Settings</span>
        </button>
        <button class="notif-bell-btn" onclick="toggleNotifPanel()" title="Notifications" aria-label="Notifications">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M18 8A6 6 0 006 8c0 7-3 9-3 9h18s-3-2-3-9"/><path d="M13.73 21a2 2 0 01-3.46 0"/></svg>
          <span class="notif-badge" id="notifBadge" style="display:none">0</span>
        </button>
        <button class="sidebar-collapse-btn" onclick="toggleSidebar()" title="Collapse sidebar" aria-label="Toggle sidebar">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="11,17 6,12 11,7"/><polyline points="18,17 13,12 18,7"/></svg>
        </button>
        <div class="system-pulse">
          <span class="pulse-dot"></span>
          <span id="sidebarMem">--% MEM</span>
        </div>
      </div>
    </nav>

    <!-- Mobile Overlay -->
    <div class="mobile-overlay" id="mobileOverlay" onclick="closeMobileSidebar()"></div>

    <!-- Main -->
    <main class="main" id="main" aria-label="Main content"></main>
  </div>

  <noscript><div style="padding:40px;text-align:center;color:#F5EFE6;font-family:monospace;background:#1C1917;height:100vh;display:flex;align-items:center;justify-content:center">JavaScript is required to run Hyperion.</div></noscript>
  <script src="/js/hyperion.js?v=2"></script>
  <script>
    // Unregister old service worker and clear caches on version change
    if('serviceWorker' in navigator){
      navigator.serviceWorker.getRegistrations().then(regs=>{regs.forEach(r=>r.unregister())});
      caches.keys().then(keys=>{keys.forEach(k=>caches.delete(k))});
      navigator.serviceWorker.register('/sw.js?v=2').catch(()=>{});
    }
  </script>
</body>
</html>

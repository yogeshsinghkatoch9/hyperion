<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="Hyperion — Your computer, unleashed. Terminal, code runner, file manager, and AI assistant.">
  <meta name="theme-color" content="#1C1917">
  <meta name="color-scheme" content="dark">
  <meta property="og:title" content="HYPERION">
  <meta property="og:description" content="Your computer, unleashed. Terminal, code runner, file manager, and AI assistant.">
  <meta property="og:type" content="website">
  <meta property="og:locale" content="en_US">
  <meta name="twitter:card" content="summary">
  <meta name="twitter:title" content="HYPERION">
  <meta name="twitter:description" content="Your computer, unleashed. Terminal, code runner, file manager, and AI assistant.">
  <title>HYPERION</title>
  <link rel="manifest" href="/manifest.json">
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'><rect width='32' height='32' rx='8' fill='%231C1917'/><text x='16' y='23' font-family='serif' font-size='20' font-weight='bold' fill='%23DA7756' text-anchor='middle'>H</text></svg>">
  <link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;500;600;700&family=Plus+Jakarta+Sans:wght@400;500;600;700&family=Libre+Baskerville:wght@400;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@xterm/xterm@5.5.0/css/xterm.min.css">
  <script src="https://cdn.jsdelivr.net/npm/@xterm/xterm@5.5.0/lib/xterm.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/@xterm/addon-fit@0.10.0/lib/addon-fit.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/@xterm/addon-web-links@0.11.0/lib/addon-web-links.min.js"></script>
  <link rel="stylesheet" href="/css/hyperion.css?v=13">
  <style>
    /* Critical inline styles — cannot be cached stale */
    .topnav-groups,.topnav-dropdown,.topnav-dropdown-overlay,.topnav-dash-btn{display:none!important}
    .nav-sidebar{position:fixed;top:48px;left:0;bottom:0;width:272px;z-index:300;background:#191614;border-right:1px solid rgba(218,119,86,0.15);overflow-y:auto;padding:6px 8px 80px;transform:translateX(-100%);transition:transform 0.25s cubic-bezier(0.4,0,0.2,1)}
    [data-theme="light"] .nav-sidebar{background:#FFFFFF;border-right-color:#E2DCD4}
    .nav-sidebar.open{transform:translateX(0)}
    .nav-sidebar-overlay{display:none;position:fixed;inset:48px 0 0 0;z-index:299;background:rgba(0,0,0,0.3)}
    .nav-sidebar-overlay.open{display:block}
    .topnav-hamburger{display:flex;align-items:center;justify-content:center;width:34px;height:34px;border-radius:6px;border:none;background:none;color:var(--text2);cursor:pointer}
  </style>
  <script>
    // Load saved theme before first render to prevent flash
    try {
      const tc = JSON.parse(localStorage.getItem('hyperion_theme') || '{}');
      if (tc.mode === 'light') document.documentElement.setAttribute('data-theme', 'light');
      if (tc.accent) document.documentElement.style.setProperty('--accent', tc.accent);
      if (tc.fontSize) document.documentElement.style.setProperty('--font-size', tc.fontSize + 'px');
      if (tc.borderRadius !== undefined) document.documentElement.style.setProperty('--radius', tc.borderRadius + 'px');
      if (tc.compactMode) document.documentElement.classList.add('compact-mode');
    } catch {}
  </script>
</head>
<body>
  <a href="#main" class="skip-link">Skip to content</a>
  <div class="shell">
    <!-- Top Navigation -->
    <nav class="topnav" id="sidebar" role="navigation" aria-label="Main navigation">
      <div class="topnav-left">
        <div class="logo" style="cursor:pointer" onclick="go('dashboard')">
          <div class="logo-icon">H</div>
          <span class="logo-text">HYPERION</span>
        </div>
        <button class="topnav-hamburger" id="hamburgerBtn" onclick="_toggleMobileNav()" title="Menu" aria-label="Menu">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="3" y1="6" x2="21" y2="6"/><line x1="3" y1="12" x2="21" y2="12"/><line x1="3" y1="18" x2="21" y2="18"/></svg>
        </button>
        <button class="topnav-dash-btn" data-page="dashboard" onclick="go('dashboard')" title="Dashboard">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="3" width="7" height="7"/><rect x="14" y="3" width="7" height="7"/><rect x="14" y="14" width="7" height="7"/><rect x="3" y="14" width="7" height="7"/></svg>
          <span>Dashboard</span>
        </button>
        <div class="topnav-groups" id="navItems" style="display:none!important"></div>
      </div>
      <div class="topnav-right">
        <div class="nav-search-wrap">
          <input type="text" class="nav-search" id="navSearch" placeholder="Search..." oninput="_filterNav(this.value)" aria-label="Search tools">
          <kbd class="nav-search-hint">/</kbd>
        </div>
        <button class="topnav-icon-btn" data-page="settings" onclick="go('settings')" title="Settings">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.65 1.65 0 00.33 1.82l.06.06a2 2 0 010 2.83 2 2 0 01-2.83 0l-.06-.06a1.65 1.65 0 00-1.82-.33 1.65 1.65 0 00-1 1.51V21a2 2 0 01-4 0v-.09A1.65 1.65 0 009 19.4a1.65 1.65 0 00-1.82.33l-.06.06a2 2 0 01-2.83-2.83l.06-.06A1.65 1.65 0 004.68 15a1.65 1.65 0 00-1.51-1H3a2 2 0 010-4h.09A1.65 1.65 0 004.6 9a1.65 1.65 0 00-.33-1.82l-.06-.06a2 2 0 012.83-2.83l.06.06A1.65 1.65 0 009 4.68a1.65 1.65 0 001-1.51V3a2 2 0 014 0v.09a1.65 1.65 0 001 1.51 1.65 1.65 0 001.82-.33l.06-.06a2 2 0 012.83 2.83l-.06.06A1.65 1.65 0 0019.4 9a1.65 1.65 0 001.51 1H21a2 2 0 010 4h-.09a1.65 1.65 0 00-1.51 1z"/></svg>
        </button>
        <button class="topnav-icon-btn notif-bell-btn" onclick="toggleNotifPanel()" title="Notifications">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M18 8A6 6 0 006 8c0 7-3 9-3 9h18s-3-2-3-9"/><path d="M13.73 21a2 2 0 01-3.46 0"/></svg>
          <span class="notif-badge" id="notifBadge" style="display:none">0</span>
        </button>
        <div class="topnav-mem">
          <span class="pulse-dot"></span>
          <span id="sidebarMem">--</span>
        </div>
        <button class="topnav-icon-btn" onclick="logout()" title="Logout">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M9 21H5a2 2 0 01-2-2V5a2 2 0 012-2h4"/><polyline points="16 17 21 12 16 7"/><line x1="21" y1="12" x2="9" y2="12"/></svg>
        </button>
      </div>
    </nav>
    <!-- Sidebar nav (hamburger) -->
    <div class="nav-sidebar-overlay" id="navSidebarOverlay" onclick="_toggleMobileNav()"></div>
    <aside class="nav-sidebar" id="mobileNav"></aside>

    <!-- Main -->
    <main class="main" id="main" aria-label="Main content"></main>
  </div>

  <noscript><div style="padding:40px;text-align:center;color:#F5EFE6;font-family:monospace;background:#1C1917;height:100vh;display:flex;align-items:center;justify-content:center">JavaScript is required to run Hyperion.</div></noscript>
  <script>window.onerror=function(m,s,l,c,e){document.getElementById('main').innerHTML='<pre style="color:red;padding:40px;white-space:pre-wrap">JS ERROR: '+m+'\nFile: '+s+'\nLine: '+l+':'+c+'</pre>';}</script>
  <script src="/js/hyperion.js?v=13"></script>
  <script>
    // Kill service worker and clear ALL caches
    if('serviceWorker' in navigator){
      navigator.serviceWorker.getRegistrations().then(function(regs){regs.forEach(function(r){r.unregister()})});
      caches.keys().then(function(keys){keys.forEach(function(k){caches.delete(k)})});
    }
  </script>
</body>
</html>

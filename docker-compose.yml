version: '3.8'
services:
  hyperion:
    build: .
    ports:
      - "${PORT:-3333}:3333"
      - "${MCP_PORT:-3334}:3334"
    volumes:
      - ./data:/app/data
    environment:
      - PORT=3333
      - MCP_ENABLED=${MCP_ENABLED:-false}
      - MCP_PORT=${MCP_PORT:-3334}
      - DISCOVERY_ENABLED=${DISCOVERY_ENABLED:-false}
      - LOG_LEVEL=${LOG_LEVEL:-info}
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3333/api/health"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s
    deploy:
      resources:
        limits:
          memory: 512M
          cpus: '1.0'
        reservations:
          memory: 128M
          cpus: '0.25'
